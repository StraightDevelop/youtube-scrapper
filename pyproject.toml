# Project tooling config. Introduced in Phase 1 (test safety net) — the repo had no
# pyproject before. Holds pytest + coverage configuration so a bare `pytest` run
# (the loop grader's Python gate, scripts/loop_grade.sh) enforces the done bar.

[tool.pytest.ini_options]
testpaths = ["tests"]
# Put the repo root on sys.path so tests import `from shared...` without hacks.
pythonpath = ["."]
# A bare `pytest` (incl. the grader's `pytest -q`) auto-applies the coverage gate.
addopts = "-q --cov --cov-report=term-missing --cov-fail-under=85"

[tool.coverage.run]
branch = true
# Gate scope. Phase 1: the 5 fully-pure modules. Phase 2a adds the yt_dlp-boundary
# modules as each lands under 85% via mocked tests (see
# specs/phase2-boundary-coverage/TECH.md). channel_extractor + video_downloader
# join here as their Phase 2a test modules land.
include = [
    "shared/youtube/url_validator.py",
    "shared/utils/text_cleaner.py",
    "shared/io/jsonl_writer.py",
    "shared/io/summary_writer.py",
    "shared/io/resume_reader.py",
    "shared/youtube/transcript_fetcher.py",
    "shared/youtube/channel_extractor.py",
    "shared/youtube/video_downloader.py",
    "shared/youtube/concurrent_fetch.py",
]

[tool.coverage.report]
show_missing = true
